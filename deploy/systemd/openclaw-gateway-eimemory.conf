# Managed by eimemory immutable release installer
[Service]
MemoryAccounting=yes
MemoryHigh=3G
MemoryMax=4G
MemorySwapMax=512M
TasksAccounting=yes
TasksMax=96
OOMPolicy=kill
Environment=EIMEMORY_ROOT=/var/lib/eimemory
Environment=EIMEMORY_CONFIG_DIR=/etc/eimemory
Environment=PYTHONDONTWRITEBYTECODE=1
Environment=PYTHONPYCACHEPREFIX=/var/lib/eimemory/.pycache/@EIMEMORY_COMMIT@
Environment=EIMEMORY_RUNTIME_COMMIT=@EIMEMORY_COMMIT@
Environment=PYTHONPATH=/opt/eimemory/current:/opt/eimemory/current/.venv/lib/python3.13/site-packages
Environment="EIMEMORY_HOOK_COMMAND=/opt/eimemory/current/.venv/bin/eimemory openclaw-hook"
Environment="EIMEMORY_BRIDGE_COMMAND=/opt/eimemory/current/.venv/bin/eimemory ei-bridge feishu"
Environment=EIBRAIN_MONITOR_URL=http://127.0.0.1:18080/status.json
ExecStartPre=/opt/eimemory/current/.venv/bin/python /opt/eimemory/current/deploy/patch_openclaw_restart_recovery_scope.py --openclaw-root %h/n/lib/node_modules/openclaw
