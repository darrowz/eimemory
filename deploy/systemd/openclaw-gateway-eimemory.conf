[Service]
Environment=EIMEMORY_ROOT=/var/lib/eimemory
Environment=EIMEMORY_CONFIG_DIR=/etc/eimemory
Environment="EIMEMORY_HOOK_COMMAND=/opt/eimemory/current/.venv/bin/python -m eimemory.cli.main openclaw-hook"
Environment="EIMEMORY_BRIDGE_COMMAND=/opt/eimemory/current/.venv/bin/python -m eimemory.cli.main ei-bridge feishu"
Environment=EIBRAIN_MONITOR_URL=http://127.0.0.1:18080/status.json
